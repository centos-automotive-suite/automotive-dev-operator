            systemd:
              enabled_services:
                - sshd.service
                - fixup.service

          qm:
            content:
              rpms:
                - stress-ng

          image:
            sealed: false
            image_size: 10GiB
            partitions:
              var_qm:
                size: 1GiB

          auth:
            root_password: "$6$xoLqEUz0cGGJRx01$H3H/bFm0myJPULNMtbSsOFd/2BnHqHkMD92Sfxd.EKM9hXTWSmELG8cf205l6dktomuTcgKGGtGDgtvHVXSWU."
            root_ssh_keys:
              - "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILKx5O9oCqfSyOZQP/VNMIlK4o/ru0TxJmFwpD3Bc43B auto-qe"
            sshd_config:
              PermitRootLogin: true
              PasswordAuthentication: true
            users:
              guest:
                uid: 2000
                gid: 2000
                password: "$6$xoLqEUz0cGGJRx01$H3H/bFm0myJPULNMtbSsOFd/2BnHqHkMD92Sfxd.EKM9hXTWSmELG8cf205l6dktomuTcgKGGtGDgtvHVXSWU."
                groups:
                  - guest
            groups:
              guest:
                gid: 2000

          experimental:
            internal_defines:
              grow_rootfs: false
              use_module_sig_enforce: false
              use_transient_etc: false
      export:
        format: simg
        disk:
          oci: quay.io/bzlotnik/ebbr:disk
