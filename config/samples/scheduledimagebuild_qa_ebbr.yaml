apiVersion: automotive.sdv.cloud.redhat.com/v1alpha1
kind: ScheduledImageBuild
metadata:
  name: nightly-qa-ebbr
spec:
  schedule: "23 17 * * *"
  concurrencyPolicy: Forbid
  successfulBuildsHistoryLimit: 3
  failedBuildsHistoryLimit: 1
  startingDeadlineSeconds: 3600
  publishToCatalog:
    enabled: true
    tags:
      - nightly
      - qa
      - ebbr
  imageBuildTemplate:
    metadata:
      labels:
        team: qa
        schedule: nightly
        target: ebbr
    spec:
      architecture: aarch64
      aib:
        distro: autosd
        target: ebbr
        mode: image
        image: quay.io/centos-sig-automotive/automotive-image-builder:1.3.2
        manifest: |
          name: qa

          content:
            add_files:
              - path: /etc/sysctl.d/99-custom-networking.conf
                text: |
                  net.ipv4.conf.all.arp_ignore=1
                  net.ipv4.conf.all.arp_announce=2
                  net.ipv4.conf.all.rp_filter=2
              - path: /etc/systemd/system/fixup.service
                text: |
                  [Unit]
                  Description=One-time config fixup
                  After=local-fs.target

                  [Service]
                  Type=oneshot
                  ExecStart=/usr/bin/sed -i 's/.*LOGIN_TIMEOUT.*/LOGIN_TIMEOUT  600/' /etc/login.defs
                  ExecStartPost=/usr/bin/systemctl disable fixup.service

                  [Install]
                  WantedBy=multi-user.target

            repos:
              - id: EPEL
                metalink: https://mirrors.fedoraproject.org/metalink?repo=epel-10&arch=$arch

            rpms:
              - openssh-server
              - chrony
              - CUnit
              - NetworkManager-libreswan
              - NetworkManager-ovs
              - aardvark-dns
              - annobin-annocheck
              - asciidoc
              - audit
              - augeas-libs
              - automotive-image-builder
              - avahi-libs
              - bash
              - bash-completion
              - bc
              - bcc
              - bcc-tools
              - beakerlib
              - bind
              - bind-dnssec-utils
              - bind-utils
              - binutils
              - blktrace
              - bluechi-agent
              - bluechi-controller
              - bluechi-ctl
              - bluechi-is-online
              - bluechi-selinux
              - boost
              - bpftool
              - bpftrace
              - bridge-utils
              - btrfs-progs
              - buildah
              - busybox
              - byacc
              - bzip2
              - c-ares
              - catatonit
              - checkpolicy
              - chrpath
              - cifs-utils
              - clang
              - cmake
              - conntrack-tools
              - container-tools
              - createrepo_c
              - criu
              - criu-libs
              - cronie
              - crypto-policies-scripts
