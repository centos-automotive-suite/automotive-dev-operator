---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: softwarebuilds.automotive.sdv.cloud.redhat.com
spec:
  group: automotive.sdv.cloud.redhat.com
  names:
    kind: SoftwareBuild
    listKind: SoftwareBuildList
    plural: softwarebuilds
    shortNames:
    - sb
    singular: softwarebuild
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.runtime.image
      name: Image
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SoftwareBuild is the Schema for the softwarebuilds API.
          It drives a generic, stage-based Tekton pipeline that can build software
          for any target OS or toolchain by specifying a runtime container image and
          five sequential shell commands.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SoftwareBuildSpec defines the desired state of SoftwareBuild.
            properties:
              destination:
                description: SoftwareBuildDestinationSpec describes where artifacts
                  go.
                properties:
                  path:
                    type: string
                  type:
                    description: SoftwareBuildDestinationType identifies where build
                      artifacts are stored.
                    enum:
                    - sharedFolder
                    type: string
                required:
                - type
                type: object
              runtime:
                description: |-
                  SoftwareBuildRuntimeSpec configures the container environment used for every
                  pipeline stage unless overridden per-stage.
                properties:
                  image:
                    default: ubuntu:24.04
                    description: Image is the container image that provides the build
                      toolchain.
                    minLength: 1
                    type: string
                  serviceAccountName:
                    description: ServiceAccountName is the Kubernetes SA the build
                      pod runs as.
                    type: string
                type: object
              source:
                description: SoftwareBuildSourceSpec identifies the code location.
                properties:
                  git:
                    description: SoftwareBuildGitSource describes a Git repository
                      to clone.
                    properties:
                      credentialsSecretRef:
                        description: CredentialsSecretRef references a secret for
                          private repo access (not yet implemented).
                        properties:
                          key:
                            type: string
                          name:
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      revision:
                        default: main
                        pattern: ^[a-zA-Z0-9._/-]+$
                        type: string
                      url:
                        pattern: ^https?://[^\s;|&$'"]+$
                        type: string
                    required:
                    - url
                    type: object
                  pvc:
                    description: SoftwareBuildPVCSource references an existing PVC.
                    properties:
                      claimName:
                        minLength: 1
                        type: string
                      path:
                        default: /
                        type: string
                    required:
                    - claimName
                    type: object
                  type:
                    description: SoftwareBuildSourceType identifies where source code
                      is obtained from.
                    enum:
                    - git
                    - pvc
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: git source details required when type is git
                  rule: self.type != 'git' || has(self.git)
                - message: pvc source details required when type is pvc
                  rule: self.type != 'pvc' || has(self.pvc)
              stages:
                description: SoftwareBuildPipelineStages groups the five sequential
                  stages.
                properties:
                  build:
                    description: SoftwareBuildStageSpec defines a single pipeline
                      stage.
                    properties:
                      command:
                        description: Command is executed via bash inside the runtime
                          image.
                        minLength: 1
                        type: string
                      image:
                        description: Image overrides the runtime image for this stage
                          only.
                        type: string
                    required:
                    - command
                    type: object
                  deploy:
                    description: SoftwareBuildStageSpec defines a single pipeline
                      stage.
                    properties:
                      command:
                        description: Command is executed via bash inside the runtime
                          image.
                        minLength: 1
                        type: string
                      image:
                        description: Image overrides the runtime image for this stage
                          only.
                        type: string
                    required:
                    - command
                    type: object
                  fetch:
                    description: SoftwareBuildStageSpec defines a single pipeline
                      stage.
                    properties:
                      command:
                        description: Command is executed via bash inside the runtime
                          image.
                        minLength: 1
                        type: string
                      image:
                        description: Image overrides the runtime image for this stage
                          only.
                        type: string
                    required:
                    - command
                    type: object
                  postbuild:
                    description: SoftwareBuildStageSpec defines a single pipeline
                      stage.
                    properties:
                      command:
                        description: Command is executed via bash inside the runtime
                          image.
                        minLength: 1
                        type: string
                      image:
                        description: Image overrides the runtime image for this stage
                          only.
                        type: string
                    required:
                    - command
                    type: object
                  prebuild:
                    description: SoftwareBuildStageSpec defines a single pipeline
                      stage.
                    properties:
                      command:
                        description: Command is executed via bash inside the runtime
                          image.
                        minLength: 1
                        type: string
                      image:
                        description: Image overrides the runtime image for this stage
                          only.
                        type: string
                    required:
                    - command
                    type: object
                required:
                - build
                - deploy
                - fetch
                - postbuild
                - prebuild
                type: object
              timeoutSeconds:
                format: int64
                minimum: 0
                type: integer
            required:
            - destination
            - source
            - stages
            type: object
          status:
            description: SoftwareBuildStatus defines the observed state of SoftwareBuild.
            properties:
              artifactURI:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              failureReason:
                type: string
              phase:
                description: SoftwareBuildPhase represents the current lifecycle phase.
                type: string
              pipelineRunName:
                type: string
              stages:
                items:
                  description: SoftwareBuildStageStatus captures per-stage progress.
                  properties:
                    finishedAt:
                      format: date-time
                      type: string
                    message:
                      type: string
                    name:
                      type: string
                    startedAt:
                      format: date-time
                      type: string
                    state:
                      type: string
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
