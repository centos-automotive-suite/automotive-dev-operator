apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/centos-automotive-suite/automotive-dev-operator?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "main"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: automotive-dev-operator
    appstudio.openshift.io/component: operator
    pipelines.appstudio.openshift.io/type: build
  name: release-on-push
  namespace: default-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/rh-sdv-cloud/automotive-dev-operator:{{revision}}
  - name: bundle-image
    value: quay.io/rh-sdv-cloud/automotive-dev-operator-bundle:{{revision}}
  - name: catalog-image
    value: quay.io/rh-sdv-cloud/automotive-dev-operator-catalog:{{revision}}
  - name: push-latest
    value: "true"
  - name: dockerfile
    value: Dockerfile
  - name: skip-checks
    value: "false"
  taskRunSpecs:
  - pipelineTaskName: build-operator
    serviceAccountName: build-pipeline
    computeResources:
      requests:
        memory: 6Gi
        cpu: "4"
      limits:
        memory: 12Gi
        cpu: "8"
  - pipelineTaskName: build-bundle
    serviceAccountName: build-pipeline
    computeResources:
      requests:
        memory: 6Gi
        cpu: "4"
      limits:
        memory: 12Gi
        cpu: "8"
  - pipelineTaskName: build-catalog
    serviceAccountName: build-pipeline
    computeResources:
      requests:
        memory: 4Gi
        cpu: "2"
      limits:
        memory: 8Gi
        cpu: "4"
  pipelineSpec:
    description: |
      Release pipeline for automotive-dev-operator.

      Builds operator, bundle, and catalog container images in order using buildah (multi-arch arm64 + amd64).
      Source artifacts are shared between tasks via OCI trusted artifacts.
      On push to main: pushes revision-tagged and :latest images.
      On PR: pushes on-pr-<revision> images only.
    params:
    - description: Source Repository URL
      name: git-url
      type: string
    - default: ""
      description: Revision of the Source Repository
      name: revision
      type: string
    - description: Fully Qualified Output Image
      name: output-image
      type: string
    - description: Bundle image to build and push
      name: bundle-image
      type: string
    - description: Catalog image to build and push
      name: catalog-image
      type: string
    - default: "false"
      description: Push :latest tags in addition to the revision tag
      name: push-latest
      type: string
    - default: .
      description: Path to the source code of an application's component from where
        to build image.
      name: path-context
      type: string
    - default: Dockerfile
      description: Path to the Dockerfile inside the context specified by parameter
        path-context
      name: dockerfile
      type: string
    - default: "false"
      description: Skip checks against built image
      name: skip-checks
      type: string
    - default: ""
      description: Build dependencies to be prefetched
      name: prefetch-input
      type: string
    - default: ""
      description: Image tag expiration time, time values could be something like
        1h, 2d, 3w for hours, days, and weeks, respectively.
      name: image-expires-after
      type: string
    - default: "false"
      description: Add built image into an OCI image index
      name: build-image-index
      type: string
    - default: docker
      description: The format for the resulting image's mediaType. Valid values are
        oci or docker.
      name: buildah-format
      type: string
    - default: "false"
      description: Enable cache proxy configuration
      name: enable-cache-proxy
    - default: "true"
      description: Use the package registry proxy when prefetching dependencies
      name: enable-package-registry-proxy
    - default: .
      description: Target directories in component's source code to scan with SAST
        tools. Multiple values should be separated with commas.
      name: sast-target-dirs
      type: string
    - default: []
      description: Array of --build-arg values ("arg=value" strings) for buildah
      name: build-args
      type: array
    - default: ""
      description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
      name: build-args-file
      type: string
    - default: "false"
      description: Whether to enable privileged mode, should be used only with remote
        VMs
      name: privileged-nested
      type: string
    results:
    - description: ""
      name: IMAGE_URL
      value: $(tasks.build-operator.results.IMAGE_URL)
    - description: ""
      name: IMAGE_DIGEST
      value: $(tasks.build-operator.results.IMAGE_DIGEST)
    - description: ""
      name: CHAINS-GIT_URL
      value: $(tasks.clone-repository.results.url)
    - description: ""
      name: CHAINS-GIT_COMMIT
      value: $(tasks.clone-repository.results.commit)
    tasks:
    - name: init
      params:
      - name: enable-cache-proxy
        value: $(params.enable-cache-proxy)
      taskRef:
        params:
        - name: name
          value: init
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-init:0.4@sha256:90f0e8e134c4bb919956bb095d62365907adeea4fbeb4cebbf5f3f94286bf967
        - name: kind
          value: task
        resolver: bundles
    - name: clone-repository
      params:
      - name: url
        value: $(params.git-url)
      - name: revision
        value: $(params.revision)
      - name: ociStorage
        value: $(params.output-image).git
      - name: ociArtifactExpiresAfter
        value: $(params.image-expires-after)
      runAfter:
      - init
      taskRef:
        params:
        - name: name
          value: git-clone-oci-ta-min
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta-min:0.1@sha256:ad1487d03967da7e9e032ba47b094ebf7e46c8e6f5d47faa9f8c15e1617fb208
        - name: kind
          value: task
        resolver: bundles
      workspaces:
      - name: basic-auth
        workspace: git-auth
    - name: prefetch-dependencies
      params:
      - name: input
        value: $(params.prefetch-input)
      - name: enable-package-registry-proxy
        value: $(params.enable-package-registry-proxy)
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
      - name: ociStorage
        value: $(params.output-image).prefetch
      - name: ociArtifactExpiresAfter
        value: $(params.image-expires-after)
      runAfter:
      - clone-repository
      taskRef:
        params:
        - name: name
          value: prefetch-dependencies-oci-ta-min
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-prefetch-dependencies-oci-ta-min:0.3@sha256:af12fee3a119b4099d18e19f81cd963a4077dc941da9e28ba82e43f656a65929
        - name: kind
          value: task
        resolver: bundles
      workspaces:
      - name: git-basic-auth
        workspace: git-auth
      - name: netrc
        workspace: netrc
    - name: build-operator
      params:
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      - name: IMAGE
        value: $(params.output-image)
      - name: DOCKERFILE
        value: $(params.dockerfile)
      - name: PUSH_LATEST
        value: $(params.push-latest)
      runAfter:
      - prefetch-dependencies
      taskSpec:
        params:
        - name: SOURCE_ARTIFACT
        - name: IMAGE
        - name: DOCKERFILE
          default: Dockerfile
        - name: PUSH_LATEST
          default: "false"
        results:
        - name: IMAGE_URL
        - name: IMAGE_DIGEST
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          volumeMounts:
          - name: workdir
            mountPath: /var/workdir
        steps:
        - name: fetch-source
          image: ghcr.io/oras-project/oras:v1.2.0
          script: |
            #!/usr/bin/env sh
            set -e
            mkdir -p /var/workdir/source
            ARTIFACT="$(params.SOURCE_ARTIFACT)"
            ARTIFACT="${ARTIFACT#oci:}"
            oras blob fetch \
              --registry-config "${HOME}/.docker/config.json" \
              "${ARTIFACT}" \
              --output - | tar xz -C /var/workdir/source
        - name: build-and-push
          image: quay.io/buildah/stable:latest
          securityContext:
            privileged: true
          script: |
            #!/usr/bin/env bash
            set -euo pipefail

            IMAGE_FULL="$(params.IMAGE)"
            IMAGE_BASE=$(echo "${IMAGE_FULL}" | sed 's/:[^/:]*$//')
            IMAGE_TAG="${IMAGE_FULL##*:}"
            DOCKERFILE="$(params.DOCKERFILE)"
            AUTHFILE="${HOME}/.docker/config.json"
            PUSH_LATEST="$(params.PUSH_LATEST)"

            cd /var/workdir/source

            echo "=== Building linux/arm64 (native) ==="
            buildah build \
              --platform linux/arm64 \
              --build-arg TARGETARCH=arm64 \
              --build-arg TARGETOS=linux \
              --build-arg BUILDPLATFORM=linux/arm64 \
              --authfile "${AUTHFILE}" \
              -t "${IMAGE_BASE}:${IMAGE_TAG}-arm64" \
              -f "${DOCKERFILE}" .
            buildah push --authfile "${AUTHFILE}" "${IMAGE_BASE}:${IMAGE_TAG}-arm64"

            echo "=== Building linux/amd64 (cross-compilation) ==="
            NATIVE_ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
            buildah build \
              --platform linux/amd64 \
              --build-arg TARGETARCH=amd64 \
              --build-arg TARGETOS=linux \
              --build-arg BUILDPLATFORM=linux/${NATIVE_ARCH} \
              --authfile "${AUTHFILE}" \
              -t "${IMAGE_BASE}:${IMAGE_TAG}-amd64" \
              -f "${DOCKERFILE}" .
            buildah push --authfile "${AUTHFILE}" "${IMAGE_BASE}:${IMAGE_TAG}-amd64"

            echo "=== Creating manifest: ${IMAGE_BASE}:${IMAGE_TAG} ==="
            buildah manifest rm multiarch 2>/dev/null || true
            buildah manifest create multiarch
            buildah manifest add multiarch "${IMAGE_BASE}:${IMAGE_TAG}-arm64"
            buildah manifest add multiarch "${IMAGE_BASE}:${IMAGE_TAG}-amd64"
            buildah manifest push --all multiarch \
              --digestfile /tmp/manifest-digest.txt \
              --authfile "${AUTHFILE}" \
              "docker://${IMAGE_BASE}:${IMAGE_TAG}"
            DIGEST=$(cat /tmp/manifest-digest.txt)
            if [ -z "${DIGEST}" ]; then
              echo "ERROR: Failed to extract manifest digest" >&2
              exit 1
            fi

            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "=== Tagging as :latest, :latest-arm64, :latest-amd64 ==="
              buildah push --authfile "${AUTHFILE}" \
                "${IMAGE_BASE}:${IMAGE_TAG}-arm64" \
                "docker://${IMAGE_BASE}:latest-arm64"
              buildah push --authfile "${AUTHFILE}" \
                "${IMAGE_BASE}:${IMAGE_TAG}-amd64" \
                "docker://${IMAGE_BASE}:latest-amd64"
              buildah manifest rm latest-manifest 2>/dev/null || true
              buildah manifest create latest-manifest
              buildah manifest add latest-manifest "${IMAGE_BASE}:${IMAGE_TAG}-arm64"
              buildah manifest add latest-manifest "${IMAGE_BASE}:${IMAGE_TAG}-amd64"
              buildah manifest push --all latest-manifest \
                --authfile "${AUTHFILE}" \
                "docker://${IMAGE_BASE}:latest"
            fi
            echo -n "${IMAGE_BASE}:${IMAGE_TAG}" > $(results.IMAGE_URL.path)
            echo -n "${DIGEST}" > $(results.IMAGE_DIGEST.path)
        volumes:
        - name: workdir
          emptyDir: {}
    - name: build-bundle
      params:
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      - name: IMAGE
        value: $(params.bundle-image)
      - name: DOCKERFILE
        value: bundle.Dockerfile
      - name: OPERATOR_IMAGE
        value: $(tasks.build-operator.results.IMAGE_URL)
      - name: PUSH_LATEST
        value: $(params.push-latest)
      runAfter:
      - build-operator
      taskSpec:
        params:
        - name: SOURCE_ARTIFACT
        - name: IMAGE
        - name: DOCKERFILE
          default: Dockerfile
        - name: OPERATOR_IMAGE
        - name: PUSH_LATEST
          default: "false"
        results:
        - name: IMAGE_URL
        - name: IMAGE_DIGEST
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          volumeMounts:
          - name: workdir
            mountPath: /var/workdir
        steps:
        - name: fetch-source
          image: ghcr.io/oras-project/oras:v1.2.0
          script: |
            #!/usr/bin/env sh
            set -e
            mkdir -p /var/workdir/source
            ARTIFACT="$(params.SOURCE_ARTIFACT)"
            ARTIFACT="${ARTIFACT#oci:}"
            oras blob fetch \
              --registry-config "${HOME}/.docker/config.json" \
              "${ARTIFACT}" \
              --output - | tar xz -C /var/workdir/source
        - name: prepare-bundle
          image: registry.access.redhat.com/ubi9/go-toolset:1.25.9
          securityContext:
            runAsUser: 0
          script: |
            #!/usr/bin/env bash
            set -euo pipefail
            dnf install -y -q make git
            cd /var/workdir/source
            export IMG="$(params.OPERATOR_IMAGE)"
            export VERSION="$(tr -d '[:space:]' < VERSION)"
            echo "Generating bundle for ${IMG} (OLM version ${VERSION})..."
            make bundle
        - name: build-and-push
          image: quay.io/buildah/stable:latest
          securityContext:
            privileged: true
          script: |
            #!/usr/bin/env bash
            set -euo pipefail

            IMAGE_FULL="$(params.IMAGE)"
            IMAGE_BASE=$(echo "${IMAGE_FULL}" | sed 's/:[^/:]*$//')
            IMAGE_TAG="${IMAGE_FULL##*:}"
            DOCKERFILE="$(params.DOCKERFILE)"
            AUTHFILE="${HOME}/.docker/config.json"
            PUSH_LATEST="$(params.PUSH_LATEST)"

            cd /var/workdir/source

            echo "=== Building linux/arm64 (native) ==="
            buildah build \
              --platform linux/arm64 \
              --build-arg TARGETARCH=arm64 \
              --build-arg TARGETOS=linux \
              --build-arg BUILDPLATFORM=linux/arm64 \
              --authfile "${AUTHFILE}" \
              -t "${IMAGE_BASE}:${IMAGE_TAG}-arm64" \
              -f "${DOCKERFILE}" .
            buildah push --authfile "${AUTHFILE}" "${IMAGE_BASE}:${IMAGE_TAG}-arm64"

            echo "=== Building linux/amd64 (cross-compilation) ==="
            NATIVE_ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
            buildah build \
              --platform linux/amd64 \
              --build-arg TARGETARCH=amd64 \
              --build-arg TARGETOS=linux \
              --build-arg BUILDPLATFORM=linux/${NATIVE_ARCH} \
              --authfile "${AUTHFILE}" \
              -t "${IMAGE_BASE}:${IMAGE_TAG}-amd64" \
              -f "${DOCKERFILE}" .
            buildah push --authfile "${AUTHFILE}" "${IMAGE_BASE}:${IMAGE_TAG}-amd64"

            echo "=== Creating manifest: ${IMAGE_BASE}:${IMAGE_TAG} ==="
            buildah manifest rm multiarch 2>/dev/null || true
            buildah manifest create multiarch
            buildah manifest add multiarch "${IMAGE_BASE}:${IMAGE_TAG}-arm64"
            buildah manifest add multiarch "${IMAGE_BASE}:${IMAGE_TAG}-amd64"
            buildah manifest push --all multiarch \
              --digestfile /tmp/manifest-digest.txt \
              --authfile "${AUTHFILE}" \
              "docker://${IMAGE_BASE}:${IMAGE_TAG}"
            DIGEST=$(cat /tmp/manifest-digest.txt)
            if [ -z "${DIGEST}" ]; then
              echo "ERROR: Failed to extract manifest digest" >&2
              exit 1
            fi

            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "=== Tagging as :latest, :latest-arm64, :latest-amd64 ==="
              buildah push --authfile "${AUTHFILE}" \
                "${IMAGE_BASE}:${IMAGE_TAG}-arm64" \
                "docker://${IMAGE_BASE}:latest-arm64"
              buildah push --authfile "${AUTHFILE}" \
                "${IMAGE_BASE}:${IMAGE_TAG}-amd64" \
                "docker://${IMAGE_BASE}:latest-amd64"
              buildah manifest rm latest-manifest 2>/dev/null || true
              buildah manifest create latest-manifest
              buildah manifest add latest-manifest "${IMAGE_BASE}:${IMAGE_TAG}-arm64"
              buildah manifest add latest-manifest "${IMAGE_BASE}:${IMAGE_TAG}-amd64"
              buildah manifest push --all latest-manifest \
                --authfile "${AUTHFILE}" \
                "docker://${IMAGE_BASE}:latest"
            fi
            echo -n "${IMAGE_BASE}:${IMAGE_TAG}" > $(results.IMAGE_URL.path)
            echo -n "${DIGEST}" > $(results.IMAGE_DIGEST.path)
        volumes:
        - name: workdir
          emptyDir: {}
    - name: build-catalog
      params:
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      - name: IMAGE
        value: $(params.catalog-image)
      - name: DOCKERFILE
        value: catalog.Dockerfile
      - name: BUNDLE_IMAGE
        value: $(tasks.build-bundle.results.IMAGE_URL)
      - name: PUSH_LATEST
        value: $(params.push-latest)
      runAfter:
      - build-bundle
      taskSpec:
        params:
        - name: SOURCE_ARTIFACT
        - name: IMAGE
        - name: DOCKERFILE
          default: Dockerfile
        - name: BUNDLE_IMAGE
        - name: PUSH_LATEST
          default: "false"
        results:
        - name: IMAGE_URL
        - name: IMAGE_DIGEST
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          volumeMounts:
          - name: workdir
            mountPath: /var/workdir
        steps:
        - name: fetch-source
          image: ghcr.io/oras-project/oras:v1.2.0
          script: |
            #!/usr/bin/env sh
            set -e
            mkdir -p /var/workdir/source
            ARTIFACT="$(params.SOURCE_ARTIFACT)"
            ARTIFACT="${ARTIFACT#oci:}"
            oras blob fetch \
              --registry-config "${HOME}/.docker/config.json" \
              "${ARTIFACT}" \
              --output - | tar xz -C /var/workdir/source
        - name: prepare-catalog
          image: registry.access.redhat.com/ubi9/go-toolset:1.25.9
          securityContext:
            runAsUser: 0
          script: |
            #!/usr/bin/env bash
            set -euo pipefail
            dnf install -y -q make git
            export HOME="${HOME:-/tekton/home}"
            mkdir -p "${HOME}/.config/containers"
            cat > "${HOME}/.config/containers/policy.json" <<'POLICY'
            {
              "default": [{"type": "insecureAcceptAnything"}]
            }
            POLICY
            export DOCKER_CONFIG="${HOME}/.docker"
            cd /var/workdir/source
            export BUNDLE_IMG="$(params.BUNDLE_IMAGE)"
            export VERSION="$(tr -d '[:space:]' < VERSION)"
            echo "Generating catalog from ${BUNDLE_IMG} (OLM version ${VERSION})..."
            make catalog-update
        - name: build-and-push
          image: quay.io/buildah/stable:latest
          securityContext:
            privileged: true
          script: |
            #!/usr/bin/env bash
            set -euo pipefail

            IMAGE_FULL="$(params.IMAGE)"
            IMAGE_BASE=$(echo "${IMAGE_FULL}" | sed 's/:[^/:]*$//')
            IMAGE_TAG="${IMAGE_FULL##*:}"
            DOCKERFILE="$(params.DOCKERFILE)"
            AUTHFILE="${HOME}/.docker/config.json"
            PUSH_LATEST="$(params.PUSH_LATEST)"

            cd /var/workdir/source

            echo "=== Building linux/arm64 (native) ==="
            buildah build \
              --platform linux/arm64 \
              --build-arg TARGETARCH=arm64 \
              --build-arg TARGETOS=linux \
              --build-arg BUILDPLATFORM=linux/arm64 \
              --authfile "${AUTHFILE}" \
              -t "${IMAGE_BASE}:${IMAGE_TAG}-arm64" \
              -f "${DOCKERFILE}" .
            buildah push --authfile "${AUTHFILE}" "${IMAGE_BASE}:${IMAGE_TAG}-arm64"

            echo "=== Building linux/amd64 (cross-compilation) ==="
            NATIVE_ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
            buildah build \
              --platform linux/amd64 \
              --build-arg TARGETARCH=amd64 \
              --build-arg TARGETOS=linux \
              --build-arg BUILDPLATFORM=linux/${NATIVE_ARCH} \
              --authfile "${AUTHFILE}" \
              -t "${IMAGE_BASE}:${IMAGE_TAG}-amd64" \
              -f "${DOCKERFILE}" .
            buildah push --authfile "${AUTHFILE}" "${IMAGE_BASE}:${IMAGE_TAG}-amd64"

            echo "=== Creating manifest: ${IMAGE_BASE}:${IMAGE_TAG} ==="
            buildah manifest rm multiarch 2>/dev/null || true
            buildah manifest create multiarch
            buildah manifest add multiarch "${IMAGE_BASE}:${IMAGE_TAG}-arm64"
            buildah manifest add multiarch "${IMAGE_BASE}:${IMAGE_TAG}-amd64"
            buildah manifest push --all multiarch \
              --digestfile /tmp/manifest-digest.txt \
              --authfile "${AUTHFILE}" \
              "docker://${IMAGE_BASE}:${IMAGE_TAG}"
            DIGEST=$(cat /tmp/manifest-digest.txt)
            if [ -z "${DIGEST}" ]; then
              echo "ERROR: Failed to extract manifest digest" >&2
              exit 1
            fi

            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "=== Tagging as :latest, :latest-arm64, :latest-amd64 ==="
              buildah push --authfile "${AUTHFILE}" \
                "${IMAGE_BASE}:${IMAGE_TAG}-arm64" \
                "docker://${IMAGE_BASE}:latest-arm64"
              buildah push --authfile "${AUTHFILE}" \
                "${IMAGE_BASE}:${IMAGE_TAG}-amd64" \
                "docker://${IMAGE_BASE}:latest-amd64"
              buildah manifest rm latest-manifest 2>/dev/null || true
              buildah manifest create latest-manifest
              buildah manifest add latest-manifest "${IMAGE_BASE}:${IMAGE_TAG}-arm64"
              buildah manifest add latest-manifest "${IMAGE_BASE}:${IMAGE_TAG}-amd64"
              buildah manifest push --all latest-manifest \
                --authfile "${AUTHFILE}" \
                "docker://${IMAGE_BASE}:latest"
            fi
            echo -n "${IMAGE_BASE}:${IMAGE_TAG}" > $(results.IMAGE_URL.path)
            echo -n "${DIGEST}" > $(results.IMAGE_DIGEST.path)
        volumes:
        - name: workdir
          emptyDir: {}
    workspaces:
    - name: git-auth
      optional: true
    - name: netrc
      optional: true
  taskRunTemplate:
    serviceAccountName: build-pipeline
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
