apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/centos-automotive-suite/automotive-dev-operator?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "false"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "main"
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: automotive-dev-operator
    appstudio.openshift.io/component: catalog
    pipelines.appstudio.openshift.io/type: build
  name: catalog-on-push
  namespace: automotive-dev-operator-tenant
spec:
  params:
  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: output-image
    value: quay.io/rh-sdv-cloud/automotive-dev-operator-catalog:{{revision}}
  - name: dockerfile
    value: catalog.Dockerfile
  - name: bundle-image
    value: quay.io/rh-sdv-cloud/automotive-dev-operator-bundle:{{revision}}
  - name: skip-checks
    value: "false"
  taskRunSpecs:
  - pipelineTaskName: build-multiarch
    computeResources:
      requests:
        memory: 6Gi
        cpu: "4"
      limits:
        memory: 12Gi
        cpu: "8"
  pipelineSpec:
    description: |
      This pipeline is ideal for building demo container images from a Containerfile while maintaining trust after pipeline customization.

      This version of pipeline has minimal resource requests set, it's good for demonstrating and testing.

      _Uses `buildah` to create a container image leveraging [trusted artifacts](https://konflux-ci.dev/architecture/ADR/0036-trusted-artifacts.html). It also optionally creates a source image and runs some build-time tests. Information is shared between tasks using OCI artifacts instead of PVCs. EC will pass the [`trusted_task.trusted`](https://conforma.dev/docs/policy/packages/release_trusted_task.html#trusted_task__trusted) policy as long as all data used to build the artifact is generated from trusted tasks.
      This pipeline is pushed as a Tekton bundle to [quay.io](https://quay.io/repository/konflux-ci/tekton-catalog/pipeline-docker-build-oci-ta?tab=tags)_
    params:
    - description: Source Repository URL
      name: git-url
      type: string
    - default: ""
      description: Revision of the Source Repository
      name: revision
      type: string
    - description: Fully Qualified Output Image
      name: output-image
      type: string
    - default: .
      description: Path to the source code of an application's component from where
        to build image.
      name: path-context
      type: string
    - default: Dockerfile
      description: Path to the Dockerfile inside the context specified by parameter
        path-context
      name: dockerfile
      type: string
    - description: Upstream image required before building this component
      name: bundle-image
      type: string
    - default: "false"
      description: Skip checks against built image
      name: skip-checks
      type: string
    - default: "false"
      description: Execute the build with network isolation
      name: hermetic
      type: string
    - default: ""
      description: Build dependencies to be prefetched
      name: prefetch-input
      type: string
    - default: ""
      description: Image tag expiration time, time values could be something like
        1h, 2d, 3w for hours, days, and weeks, respectively.
      name: image-expires-after
      type: string
    - default: "false"
      description: Add built image into an OCI image index
      name: build-image-index
      type: string
    - default: docker
      description: The format for the resulting image's mediaType. Valid values are
        oci or docker.
      name: buildah-format
      type: string
    - default: "false"
      description: Enable cache proxy configuration
      name: enable-cache-proxy
    - default: "true"
      description: Use the package registry proxy when prefetching dependencies
      name: enable-package-registry-proxy
    - default: .
      description: Target directories in component's source code to scan with SAST
        tools. Multiple values should be separated with commas.
      name: sast-target-dirs
      type: string
    - default: []
      description: Array of --build-arg values ("arg=value" strings) for buildah
      name: build-args
      type: array
    - default: ""
      description: Path to a file with build arguments for buildah, see https://www.mankier.com/1/buildah-build#--build-arg-file
      name: build-args-file
      type: string
    - default: "false"
      description: Whether to enable privileged mode, should be used only with remote
        VMs
      name: privileged-nested
      type: string
    results:
    - description: ""
      name: IMAGE_URL
      value: $(tasks.build-multiarch.results.IMAGE_URL)
    - description: ""
      name: IMAGE_DIGEST
      value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
    - description: ""
      name: CHAINS-GIT_URL
      value: $(tasks.clone-repository.results.url)
    - description: ""
      name: CHAINS-GIT_COMMIT
      value: $(tasks.clone-repository.results.commit)
    tasks:
    - name: init
      params:
      - name: enable-cache-proxy
        value: $(params.enable-cache-proxy)
      taskRef:
        params:
        - name: name
          value: init
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-init:0.4@sha256:5a423246792ac501ea279229b42ee57da9927da441c04b5c9ff86817b0856b08
        - name: kind
          value: task
        resolver: bundles
    - name: clone-repository
      params:
      - name: url
        value: $(params.git-url)
      - name: revision
        value: $(params.revision)
      - name: ociStorage
        value: $(params.output-image).git
      - name: ociArtifactExpiresAfter
        value: $(params.image-expires-after)
      runAfter:
      - init
      taskRef:
        params:
        - name: name
          value: git-clone-oci-ta-min
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-git-clone-oci-ta-min:0.2@sha256:b3b31a1517fcc68874d471f77a3b3bf219ff19e426403f330d6b6e031da48955
        - name: kind
          value: task
        resolver: bundles
      workspaces:
      - name: basic-auth
        workspace: git-auth
    - name: prefetch-dependencies
      params:
      - name: input
        value: $(params.prefetch-input)
      - name: enable-package-registry-proxy
        value: $(params.enable-package-registry-proxy)
      - name: SOURCE_ARTIFACT
        value: $(tasks.clone-repository.results.SOURCE_ARTIFACT)
      - name: ociStorage
        value: $(params.output-image).prefetch
      - name: ociArtifactExpiresAfter
        value: $(params.image-expires-after)
      runAfter:
      - clone-repository
      taskRef:
        params:
        - name: name
          value: prefetch-dependencies-oci-ta-min
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-prefetch-dependencies-oci-ta-min:0.3@sha256:5d0f26254526e01ced656329dfd5d78dada6104c47f973f570d0422be1a796a1
        - name: kind
          value: task
        resolver: bundles
      workspaces:
      - name: git-basic-auth
        workspace: git-auth
      - name: netrc
        workspace: netrc
    - name: build-multiarch
      params:
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      - name: IMAGE
        value: $(params.output-image)
      - name: DOCKERFILE
        value: $(params.dockerfile)
      - name: BUNDLE_IMAGE
        value: $(params.bundle-image)
      - name: PUSH_LATEST
        value: "true"
      runAfter:
      - prefetch-dependencies
      taskSpec:
        params:
        - name: SOURCE_ARTIFACT
        - name: IMAGE
        - name: DOCKERFILE
          default: Dockerfile
        - name: BUNDLE_IMAGE
        - name: PUSH_LATEST
          default: "false"
        results:
        - name: IMAGE_URL
        - name: IMAGE_DIGEST
        stepTemplate:
          env:
          - name: HOME
            value: /tekton/home
          volumeMounts:
          - name: workdir
            mountPath: /var/workdir
        steps:
        - name: fetch-source
          image: ghcr.io/oras-project/oras:v1.2.0
          script: |
            #!/usr/bin/env sh
            set -e
            mkdir -p /var/workdir/source
            ARTIFACT="$(params.SOURCE_ARTIFACT)"
            ARTIFACT="${ARTIFACT#oci:}"
            oras blob fetch \
              --registry-config "${HOME}/.docker/config.json" \
              "${ARTIFACT}" \
              --output - | tar xz -C /var/workdir/source
        - name: prepare-catalog
          image: registry.access.redhat.com/ubi9/go-toolset:1.25.9
          securityContext:
            runAsUser: 0
          script: |
            #!/usr/bin/env bash
            set -euo pipefail
            dnf install -y -q make git skopeo
            export HOME="${HOME:-/tekton/home}"
            mkdir -p "${HOME}/.config/containers"
            cat > "${HOME}/.config/containers/policy.json" <<'POLICY'
            {
              "default": [{"type": "insecureAcceptAnything"}]
            }
            POLICY
            export DOCKER_CONFIG="${HOME}/.docker"
            cd /var/workdir/source
            IMAGE_REF="$(params.BUNDLE_IMAGE)"
            AUTHFILE="${HOME}/.docker/config.json"
            for attempt in $(seq 1 120); do
              if skopeo inspect "docker://${IMAGE_REF}" --authfile "${AUTHFILE}" >/dev/null 2>&1; then
                echo "Image available: ${IMAGE_REF}"
                break
              fi
              echo "Waiting for ${IMAGE_REF} (${attempt}/120)..."
              [[ "${attempt}" -eq 120 ]] && { echo "Timeout waiting for ${IMAGE_REF}" >&2; exit 1; }
              sleep 30
            done
            export BUNDLE_IMG="${IMAGE_REF}"
            export VERSION="$(tr -d '[:space:]' < VERSION)"
            echo "Generating catalog from ${BUNDLE_IMG} (OLM version ${VERSION})..."
            make catalog-update
        - name: build-and-push
          image: quay.io/buildah/stable:latest
          securityContext:
            capabilities:
              add:
              - SETFCAP
          script: |
            #!/usr/bin/env bash
            set -euo pipefail

            export STORAGE_DRIVER=vfs
            IMAGE_FULL="$(params.IMAGE)"
            IMAGE_BASE=$(echo "${IMAGE_FULL}" | sed 's/:[^/:]*$//')
            IMAGE_TAG="${IMAGE_FULL##*:}"
            DOCKERFILE="$(params.DOCKERFILE)"
            AUTHFILE="${HOME}/.docker/config.json"
            PUSH_LATEST="$(params.PUSH_LATEST)"

            cd /var/workdir/source

            echo "=== Building single-arch linux/amd64 (FBC base images may lack other arches; IIB generates multi-arch index at release time) ==="
            buildah build \
              --storage-driver vfs \
              --platform linux/amd64 \
              --authfile "${AUTHFILE}" \
              -t "${IMAGE_FULL}" \
              -f "${DOCKERFILE}" .

            buildah push \
              --storage-driver vfs \
              --authfile "${AUTHFILE}" \
              --digestfile /tmp/image-digest.txt \
              "${IMAGE_FULL}"
            DIGEST=$(cat /tmp/image-digest.txt)
            if [ -z "${DIGEST}" ]; then
              echo "ERROR: Failed to extract image digest" >&2
              exit 1
            fi

            if [ "${PUSH_LATEST}" = "true" ]; then
              echo "=== Tagging as :latest ==="
              buildah push --authfile "${AUTHFILE}" \
                "${IMAGE_FULL}" \
                "docker://${IMAGE_BASE}:latest"
            fi

            echo -n "${IMAGE_BASE}:${IMAGE_TAG}" > $(results.IMAGE_URL.path)
            echo -n "${DIGEST}" > $(results.IMAGE_DIGEST.path)
        volumes:
        - name: workdir
          emptyDir: {}
    - name: clair-scan
      params:
      - name: image-digest
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      - name: image-url
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: clair-scan
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-clair-scan:0.3@sha256:9ff424d913dd7681031a93d8bdbed622cd5536633f8ed0dbb4a9021055cf9d21
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    - name: push-dockerfile
      params:
      - name: IMAGE
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      - name: IMAGE_DIGEST
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      - name: DOCKERFILE
        value: $(params.dockerfile)
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: push-dockerfile-oci-ta
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-push-dockerfile-oci-ta:0.3@sha256:f3e97e6eaf09d6585e915c3e7b82d110d97e34202bf591a2d990127ba5bb362d
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    - name: deprecated-base-image-check
      params:
      - name: IMAGE_URL
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      - name: IMAGE_DIGEST
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: deprecated-image-check
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-deprecated-image-check:0.5@sha256:e78d0d3baf3c8cfc1a5ad278196b74032d9568b143a87c7a79ab780fedfb296e
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    - name: clamav-scan
      params:
      - name: image-digest
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      - name: image-url
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: clamav-scan-min
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-clamav-scan-min:0.3@sha256:84dac10c6e4b52c4b422c578880abf70ac57760451e38bdac5d6f4638e2abb0e
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    - name: sast-shell-check
      params:
      - name: image-digest
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      - name: image-url
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      - name: TARGET_DIRS
        value: $(params.sast-target-dirs)
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      - name: CACHI2_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: sast-shell-check-oci-ta-min
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-sast-shell-check-oci-ta-min:0.1@sha256:c71a4dda03e95553a64006b824ba917ff4669e055e3409ac5e6e2fba35051eba
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    - name: sast-unicode-check
      params:
      - name: image-digest
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      - name: image-url
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      - name: TARGET_DIRS
        value: $(params.sast-target-dirs)
      - name: SOURCE_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.SOURCE_ARTIFACT)
      - name: CACHI2_ARTIFACT
        value: $(tasks.prefetch-dependencies.results.CACHI2_ARTIFACT)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: sast-unicode-check-oci-ta-min
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-sast-unicode-check-oci-ta-min:0.4@sha256:11a0688dc2df72ca8280d3dc8c1ee45384b73015e9aa19a909f206defe87b9df
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    - name: rpms-signature-scan
      params:
      - name: image-url
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      - name: image-digest
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: rpms-signature-scan
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-rpms-signature-scan:0.2@sha256:2e79e4723f54e8fdefed4fe0f68ea789f2f71031385fc6352b6edf70d42690f6
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    - name: tpa-scan
      params:
      - name: image-digest
        value: $(tasks.build-multiarch.results.IMAGE_DIGEST)
      - name: image-url
        value: $(tasks.build-multiarch.results.IMAGE_URL)
      runAfter:
      - build-multiarch
      taskRef:
        params:
        - name: name
          value: tpa-scan
        - name: bundle
          value: quay.io/konflux-ci/tekton-catalog/task-tpa-scan:0.1@sha256:33d15e6f80b3d081fa9008e83e7353199deac12dd83c34405872af7941c367e8
        - name: kind
          value: task
        resolver: bundles
      when:
      - input: $(params.skip-checks)
        operator: in
        values:
        - "false"
    workspaces:
    - name: git-auth
      optional: true
    - name: netrc
      optional: true
  taskRunTemplate:
    serviceAccountName: build-pipeline-catalog
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
