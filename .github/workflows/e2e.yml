name: E2E Tests

on:
  pull_request:
    branches:
      - main
      - "release-*"
  push:
    branches:
      - main
      - "release-*"
  workflow_dispatch:
    inputs:
      label_filter:
        description: 'Ginkgo label filter (e.g. "operator", "bootc", "auth"). Empty runs all.'
        required: false
        default: ''

env:
  GO_VERSION: '1.25'
  CLUSTER_NAME: automotive-dev-e2e
  REGISTRY_NAME: kind-registry
  REGISTRY_PORT: '5001'
  REGISTRY_HOST: image-registry.openshift-image-registry.svc
  ARCH: arm64

jobs:
  e2e-tests:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Kind E2E environment
        uses: ./.github/actions/setup-kind-e2e
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          registry-name: ${{ env.REGISTRY_NAME }}
          registry-port: ${{ env.REGISTRY_PORT }}
          registry-host: ${{ env.REGISTRY_HOST }}
          arch: ${{ env.ARCH }}

      - name: Deploy Dex for OIDC tests
        if: >
          github.event.inputs.label_filter == 'auth' ||
          github.event.inputs.label_filter == ''
        run: hack/e2e/setup-dex.sh

      - name: Build caib CLI
        run: make build-caib

      - name: Run E2E tests
        env:
          KIND_CLUSTER: automotive-dev-e2e
          CONTAINER_TOOL: docker
          BUILD_PLATFORM: linux/${{ env.ARCH }}
          REGISTRY_HOST: ${{ env.REGISTRY_HOST }}
          REGISTRY_USERNAME: kind
          REGISTRY_PASSWORD: kind
          CAIB_SERVER: http://localhost:8080
          E2E_LABEL_FILTER: ${{ github.event.inputs.label_filter || '' }}
          E2E_NAMESPACE: ${{ github.event.inputs.label_filter && format('e2e-{0}', github.event.inputs.label_filter) || 'e2e-test-all' }}
        run: |
          if [ -z "$E2E_LABEL_FILTER" ]; then
            test_timeout=45m
          else
            case "$E2E_LABEL_FILTER" in
              operator|auth) test_timeout=15m ;;
              bootc)         test_timeout=35m ;;
              *)             test_timeout=45m ;;
            esac
          fi
          ginkgo_args=(-v -ginkgo.v -timeout "$test_timeout")
          if [ -n "$E2E_LABEL_FILTER" ]; then
            ginkgo_args+=(-ginkgo.label-filter="$E2E_LABEL_FILTER")
          fi
          go test ./test/e2e/ "${ginkgo_args[@]}"

      - name: Collect logs on failure
        if: failure()
        uses: ./.github/actions/collect-e2e-logs

      - name: Cleanup
        if: always()
        uses: ./.github/actions/cleanup-kind-e2e
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          registry-name: ${{ env.REGISTRY_NAME }}
          registry-host: ${{ env.REGISTRY_HOST }}
