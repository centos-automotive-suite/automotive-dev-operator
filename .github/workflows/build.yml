name: Build and Release
permissions:
    contents: write

on:
    push:
        branches:
            - main
            - "release-*"
        tags:
            - "v*"

env:
    REGISTRY: quay.io
    REPOSITORY: ${{ vars.REPOSITORY }}
    OPERATOR_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator
    TOOLCHAIN_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/autosd-toolchain
    AIB_BASE_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/aib-base-dev
    VERSION: ${{ github.sha }}
    AIB_CLI_BINARY: "caib"

jobs:
    build-operator-arm64:
        runs-on: ubuntu-24.04-arm
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/release-')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and push operator (ARM64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/arm64
                  push: true
                  tags: |
                      ${{ env.OPERATOR_IMAGE }}:${{ env.VERSION }}-arm64
                      ${{ env.OPERATOR_IMAGE }}:latest-arm64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build and push toolchain (ARM64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Containerfile.toolchain
                  platforms: linux/arm64
                  push: true
                  tags: |
                      ${{ env.TOOLCHAIN_IMAGE }}:${{ env.VERSION }}-arm64
                      ${{ env.TOOLCHAIN_IMAGE }}:latest-arm64
                  cache-from: type=gha,scope=toolchain-arm64
                  cache-to: type=gha,mode=max,scope=toolchain-arm64

    build-operator-amd64:
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/release-')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and push operator (AMD64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ${{ env.OPERATOR_IMAGE }}:${{ env.VERSION }}-amd64
                      ${{ env.OPERATOR_IMAGE }}:latest-amd64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Build and push toolchain (AMD64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Containerfile.toolchain
                  platforms: linux/amd64
                  push: true
                  tags: |
                      ${{ env.TOOLCHAIN_IMAGE }}:${{ env.VERSION }}-amd64
                      ${{ env.TOOLCHAIN_IMAGE }}:latest-amd64
                  cache-from: type=gha,scope=toolchain-amd64
                  cache-to: type=gha,mode=max,scope=toolchain-amd64

    create-multiarch-manifest:
        needs: [build-operator-arm64, build-operator-amd64]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/heads/release-')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Create and push multi-arch manifest
              run: |
                  docker buildx imagetools create -t ${{ env.OPERATOR_IMAGE }}:${{ env.VERSION }} \
                  ${{ env.OPERATOR_IMAGE }}:${{ env.VERSION }}-amd64 \
                  ${{ env.OPERATOR_IMAGE }}:${{ env.VERSION }}-arm64
                  docker buildx imagetools create -t ${{ env.OPERATOR_IMAGE }}:latest \
                  ${{ env.OPERATOR_IMAGE }}:latest-amd64 \
                  ${{ env.OPERATOR_IMAGE }}:latest-arm64

                  docker buildx imagetools create -t ${{ env.TOOLCHAIN_IMAGE }}:${{ env.VERSION }} \
                  ${{ env.TOOLCHAIN_IMAGE }}:${{ env.VERSION }}-amd64 \
                  ${{ env.TOOLCHAIN_IMAGE }}:${{ env.VERSION }}-arm64
                  docker buildx imagetools create -t ${{ env.TOOLCHAIN_IMAGE }}:latest \
                  ${{ env.TOOLCHAIN_IMAGE }}:latest-amd64 \
                  ${{ env.TOOLCHAIN_IMAGE }}:latest-arm64

    retag-on-release:
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Create tag alias for operator
              env:
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  # Alias the existing multi-arch manifests built on main (by sha) to the git tag
                  docker buildx imagetools create -t "${{ env.OPERATOR_IMAGE }}:${TAG_NAME}" "${{ env.OPERATOR_IMAGE }}:${{ env.VERSION }}"

            - name: Create tag alias for toolchain
              env:
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  docker buildx imagetools create -t "${{ env.TOOLCHAIN_IMAGE }}:${TAG_NAME}" "${{ env.TOOLCHAIN_IMAGE }}:${{ env.VERSION }}"

    build-bundle:
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        needs: [retag-on-release]
        env:
            BUNDLE_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator-bundle
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Install operator-sdk
              run: |
                  ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
                  OS=$(uname | awk '{print tolower($0)}')
                  OPERATOR_SDK_DL_URL=https://github.com/operator-framework/operator-sdk/releases/download/v1.42.0
                  export ARCH OS OPERATOR_SDK_DL_URL
                  curl -LO "${OPERATOR_SDK_DL_URL}/operator-sdk_${OS}_${ARCH}"
                  chmod +x "operator-sdk_${OS}_${ARCH}"
                  sudo mv "operator-sdk_${OS}_${ARCH}" /usr/local/bin/operator-sdk

            - name: Generate bundle
              env:
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  # Strip 'v' prefix for VERSION
                  VERSION="${TAG_NAME#v}"
                  IMG="${{ env.OPERATOR_IMAGE }}:${TAG_NAME}"
                  make bundle VERSION="$VERSION" IMG="$IMG"

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and push bundle image
              env:
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  docker build -f bundle.Dockerfile -t "${{ env.BUNDLE_IMAGE }}:${TAG_NAME}" .
                  docker push "${{ env.BUNDLE_IMAGE }}:${TAG_NAME}"

            - name: Validate bundle
              run: |
                  operator-sdk bundle validate ./bundle
                  operator-sdk bundle validate ./bundle --select-optional name=operatorhubv2
                  operator-sdk bundle validate ./bundle --select-optional name=capabilities
                  operator-sdk bundle validate ./bundle --select-optional name=categories

    build-catalog:
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        needs: [build-bundle]
        env:
            BUNDLE_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator-bundle
            CATALOG_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator-catalog
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Update catalog configuration
              env:
                  TAG_NAME: ${{ github.ref_name }}
              run: |
                  VERSION="${TAG_NAME#v}"
                  make catalog-update VERSION="$VERSION" \
                    BUNDLE_IMG="${{ env.BUNDLE_IMAGE }}:${TAG_NAME}"

            - name: Build and push multi-arch catalog image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: catalog.Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ env.CATALOG_IMAGE }}:${{ github.ref_name }}

    build-caib-arm64:
        runs-on: ubuntu-24.04-arm
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Build CLI for ARM64
              run: |
                  mkdir -p ./bin
                  CGO_ENABLED=0 make build-caib VERSION=${{ github.ref_name }}
                  tar czf ${AIB_CLI_BINARY}-${{ github.ref_name }}-linux-arm64.tar.gz -C bin caib

            - name: Upload ARM64 artifact
              uses: actions/upload-artifact@v4
              with:
                  name: caib-linux-arm64
                  path: ${{ env.AIB_CLI_BINARY }}-${{ github.ref_name }}-linux-arm64.tar.gz
                  retention-days: 7
                  compression-level: 0
                  if-no-files-found: error

    build-caib-amd64:
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Build CLI for AMD64
              run: |
                  mkdir -p ./bin
                  CGO_ENABLED=0 GOARCH=amd64 make build-caib VERSION=${{ github.ref_name }}
                  tar czf ${AIB_CLI_BINARY}-${{ github.ref_name }}-linux-amd64.tar.gz -C bin caib

            - name: Upload AMD64 artifact
              uses: actions/upload-artifact@v4
              with:
                  name: caib-linux-amd64
                  path: ${{ env.AIB_CLI_BINARY }}-${{ github.ref_name }}-linux-amd64.tar.gz
                  retention-days: 7
                  compression-level: 0
                  if-no-files-found: error

    build-caib-darwin-arm64:
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Build CLI for darwin/arm64
              run: |
                  mkdir -p ./bin
                  CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 make build-caib VERSION=${{ github.ref_name }}
                  tar czf ${AIB_CLI_BINARY}-${{ github.ref_name }}-darwin-arm64.tar.gz -C bin caib

            - name: Upload darwin/arm64 artifact
              uses: actions/upload-artifact@v4
              with:
                  name: caib-darwin-arm64
                  path: ${{ env.AIB_CLI_BINARY }}-${{ github.ref_name }}-darwin-arm64.tar.gz
                  retention-days: 7
                  compression-level: 0
                  if-no-files-found: error


    create-release:
        permissions:
            contents: write
        needs: [build-caib-arm64, build-caib-amd64, build-caib-darwin-arm64, build-bundle, build-catalog]
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v5
              with:
                  go-version: "1.24"

            - name: Download all CLI artifacts
              uses: actions/download-artifact@v4
              with:
                  pattern: caib-*
                  merge-multiple: true

            - name: Generate checksums
              run: |
                  sha256sum "${AIB_CLI_BINARY}"-${{ github.ref_name }}-*.tar.gz > checksums.txt
                  cat checksums.txt

            - name: Generate version-pinned installer manifest
              shell: bash
              run: |
                  set -euo pipefail
                  TAG='${{ github.ref_name }}'
                  make kustomize
                  pushd config/manager >/dev/null
                  ../../bin/kustomize edit set image controller=${{ env.OPERATOR_IMAGE }}:${TAG}
                  popd >/dev/null
                  pushd config/build-api >/dev/null
                  ../../bin/kustomize edit set image controller=${{ env.OPERATOR_IMAGE }}:${TAG}
                  popd >/dev/null
                  mkdir -p dist
                  ./bin/kustomize build config/default > dist/install-${TAG}.yaml

            - name: Create Release
              id: create_release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      ${{ env.AIB_CLI_BINARY }}-${{ github.ref_name }}-linux-arm64.tar.gz
                      ${{ env.AIB_CLI_BINARY }}-${{ github.ref_name }}-linux-amd64.tar.gz
                      ${{ env.AIB_CLI_BINARY }}-${{ github.ref_name }}-darwin-arm64.tar.gz
                      checksums.txt
                      dist/install-${{ github.ref_name }}.yaml
                  name: Release ${{ github.ref_name }}
                  body: |
                      ## Automotive Dev Operator ${{ github.ref_name }}

                      ### Container Images
                      - Operator: `${{ env.OPERATOR_IMAGE }}:${{ github.ref_name }}`
                      - Bundle: `${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator-bundle:${{ github.ref_name }}`
                      - Catalog: `${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator-catalog:${{ github.ref_name }}`
                      - Toolchain: `${{ env.TOOLCHAIN_IMAGE }}:${{ github.ref_name }}`

                      ### Install
                      ```bash
                      # CLI
                      curl -sSL https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/hack/install-caib.sh | bash -s -- ${{ github.ref_name }}

                      # Operator (kustomize)
                      kubectl apply -f https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install-${{ github.ref_name }}.yaml
                      ```
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
