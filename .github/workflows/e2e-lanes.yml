name: E2E Test Lanes

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

env:
  GO_VERSION: '1.25'
  CLUSTER_NAME: automotive-dev-e2e
  REGISTRY_NAME: kind-registry
  REGISTRY_PORT: '5001'
  REGISTRY_HOST: image-registry.openshift-image-registry.svc
  ARCH: arm64

jobs:
  parse-comment:
    if: >
      github.event.issue.pull_request &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association) &&
      startsWith(github.event.comment.body, '/e2e-')
    runs-on: ubuntu-latest
    outputs:
      label_filter: ${{ steps.parse.outputs.label_filter }}
      lane_name: ${{ steps.parse.outputs.lane_name }}
      sha: ${{ steps.get-sha.outputs.sha }}
    steps:
      - name: Parse lane from comment
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          case "$COMMENT" in
            /e2e-smoke*)
              echo "label_filter=smoke" >> "$GITHUB_OUTPUT"
              echo "lane_name=smoke" >> "$GITHUB_OUTPUT"
              ;;
            /e2e-operator*)
              echo "label_filter=operator" >> "$GITHUB_OUTPUT"
              echo "lane_name=operator" >> "$GITHUB_OUTPUT"
              ;;
            /e2e-package-mode*)
              echo "label_filter=package-mode" >> "$GITHUB_OUTPUT"
              echo "lane_name=package-mode" >> "$GITHUB_OUTPUT"
              ;;
            /e2e-features*)
              echo "label_filter=features" >> "$GITHUB_OUTPUT"
              echo "lane_name=features" >> "$GITHUB_OUTPUT"
              ;;
            /e2e-container-build*)
              echo "label_filter=container-build" >> "$GITHUB_OUTPUT"
              echo "lane_name=container-build" >> "$GITHUB_OUTPUT"
              ;;
            /e2e-bootc*)
              echo "label_filter=bootc" >> "$GITHUB_OUTPUT"
              echo "lane_name=bootc" >> "$GITHUB_OUTPUT"
              ;;
            /e2e-auth*)
              echo "label_filter=auth" >> "$GITHUB_OUTPUT"
              echo "lane_name=auth" >> "$GITHUB_OUTPUT"
              ;;
            /e2e-test-all*)
              echo "label_filter=" >> "$GITHUB_OUTPUT"
              echo "lane_name=all" >> "$GITHUB_OUTPUT"
              ;;
            *)
              printf 'Unknown e2e command: %s\n' "$COMMENT"
              printf 'Supported: /e2e-smoke, /e2e-operator, /e2e-package-mode, /e2e-features, /e2e-bootc, /e2e-container-build, /e2e-auth, /e2e-test-all\n'
              exit 1
              ;;
          esac

      - name: Get PR head SHA
        id: get-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '.head.sha')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Set commit status to pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ steps.get-sha.outputs.sha }} \
            -f state=pending \
            -f context="e2e / ${{ steps.parse.outputs.lane_name }}" \
            -f description="E2E ${{ steps.parse.outputs.lane_name }} tests running..."

      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

  e2e-lane:
    needs: parse-comment
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.parse-comment.outputs.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Kind E2E environment
        uses: ./.github/actions/setup-kind-e2e
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          registry-name: ${{ env.REGISTRY_NAME }}
          registry-port: ${{ env.REGISTRY_PORT }}
          registry-host: ${{ env.REGISTRY_HOST }}
          arch: ${{ env.ARCH }}

      - name: Deploy Dex for OIDC tests
        if: >
          needs.parse-comment.outputs.lane_name == 'auth' ||
          needs.parse-comment.outputs.lane_name == 'all'
        run: hack/e2e/setup-dex.sh

      - name: Build caib CLI
        run: make build-caib

      - name: Run E2E tests (${{ needs.parse-comment.outputs.lane_name }})
        env:
          KIND_CLUSTER: automotive-dev-e2e
          CONTAINER_TOOL: docker
          BUILD_PLATFORM: linux/${{ env.ARCH }}
          REGISTRY_HOST: ${{ env.REGISTRY_HOST }}
          REGISTRY_USERNAME: kind
          REGISTRY_PASSWORD: kind
          CAIB_SERVER: http://localhost:8080
          E2E_LABEL_FILTER: ${{ needs.parse-comment.outputs.label_filter }}
          E2E_NAMESPACE: ${{ needs.parse-comment.outputs.lane_name == 'all' && 'e2e-test-all' || format('e2e-{0}', needs.parse-comment.outputs.lane_name) }}
        run: |
          case "${{ needs.parse-comment.outputs.lane_name }}" in
            smoke|operator|auth|features) test_timeout=5m ;;
            bootc|package-mode) test_timeout=15m ;;
            container-build|all) test_timeout=45m ;;
            *)                   echo "Unknown lane: ${{ needs.parse-comment.outputs.lane_name }}" >&2; exit 1 ;;
          esac
          ginkgo_args=(-v -ginkgo.v -timeout "$test_timeout")
          if [ -n "$E2E_LABEL_FILTER" ]; then
            ginkgo_args+=(-ginkgo.label-filter="$E2E_LABEL_FILTER")
          fi
          go test ./test/e2e/ "${ginkgo_args[@]}"

      - name: Set commit status on success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.parse-comment.outputs.sha }} \
            -f state=success \
            -f context="e2e / ${{ needs.parse-comment.outputs.lane_name }}" \
            -f description="E2E ${{ needs.parse-comment.outputs.lane_name }} tests passed"

      - name: Set commit status on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.parse-comment.outputs.sha }} \
            -f state=failure \
            -f context="e2e / ${{ needs.parse-comment.outputs.lane_name }}" \
            -f description="E2E ${{ needs.parse-comment.outputs.lane_name }} tests failed"

      - name: Set commit status on cancellation
        if: cancelled()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ needs.parse-comment.outputs.sha }} \
            -f state=failure \
            -f context="e2e / ${{ needs.parse-comment.outputs.lane_name }}" \
            -f description="E2E ${{ needs.parse-comment.outputs.lane_name }} tests cancelled"

      - name: Collect logs on failure
        if: failure()
        uses: ./.github/actions/collect-e2e-logs
        with:
          namespaces: ${{ needs.parse-comment.outputs.lane_name == 'all' && 'e2e-test-all' || format('e2e-{0}', needs.parse-comment.outputs.lane_name) }}

      - name: Cleanup
        if: always()
        uses: ./.github/actions/cleanup-kind-e2e
        with:
          cluster-name: ${{ env.CLUSTER_NAME }}
          registry-name: ${{ env.REGISTRY_NAME }}
          registry-host: ${{ env.REGISTRY_HOST }}
