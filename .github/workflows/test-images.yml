name: Test Container Images

on:
    workflow_dispatch:
        inputs:
            tag_suffix:
                description: "Tag suffix for test images (e.g. 'test' produces ':test' tags)"
                required: false
                default: "test"

env:
    REGISTRY: quay.io
    REPOSITORY: ${{ vars.REPOSITORY }}
    OPERATOR_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator
    TOOLCHAIN_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/autosd-toolchain
    BUNDLE_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator-bundle
    CATALOG_IMAGE: ${{ vars.REGISTRY }}/${{ vars.REPOSITORY }}/automotive-dev-operator-catalog
    TAG: ${{ github.event.inputs.tag_suffix }}

jobs:
    build-operator-arm64:
        runs-on: ubuntu-24.04-arm
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and push operator (ARM64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/arm64
                  push: true
                  tags: ${{ env.OPERATOR_IMAGE }}:${{ env.TAG }}-arm64

            - name: Build and push toolchain (ARM64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Containerfile.toolchain
                  platforms: linux/arm64
                  push: true
                  tags: ${{ env.TOOLCHAIN_IMAGE }}:${{ env.TAG }}-arm64

    build-operator-amd64:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build and push operator (AMD64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: ${{ env.OPERATOR_IMAGE }}:${{ env.TAG }}-amd64

            - name: Build and push toolchain (AMD64)
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: Containerfile.toolchain
                  platforms: linux/amd64
                  push: true
                  tags: ${{ env.TOOLCHAIN_IMAGE }}:${{ env.TAG }}-amd64

    create-manifests:
        needs: [build-operator-arm64, build-operator-amd64]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: "1.24"

            - name: Login to Quay.io
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.REGISTRY_USER }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Create multi-arch manifests
              run: |
                  docker buildx imagetools create -t ${{ env.OPERATOR_IMAGE }}:${{ env.TAG }} \
                    ${{ env.OPERATOR_IMAGE }}:${{ env.TAG }}-amd64 \
                    ${{ env.OPERATOR_IMAGE }}:${{ env.TAG }}-arm64

                  docker buildx imagetools create -t ${{ env.TOOLCHAIN_IMAGE }}:${{ env.TAG }} \
                    ${{ env.TOOLCHAIN_IMAGE }}:${{ env.TAG }}-amd64 \
                    ${{ env.TOOLCHAIN_IMAGE }}:${{ env.TAG }}-arm64

            - name: Install operator-sdk
              run: |
                  ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
                  OS=$(uname | awk '{print tolower($0)}')
                  OPERATOR_SDK_DL_URL=https://github.com/operator-framework/operator-sdk/releases/download/v1.42.0
                  curl -LO "${OPERATOR_SDK_DL_URL}/operator-sdk_${OS}_${ARCH}"
                  chmod +x "operator-sdk_${OS}_${ARCH}"
                  sudo mv "operator-sdk_${OS}_${ARCH}" /usr/local/bin/operator-sdk

            - name: Build and push bundle image
              run: |
                  IMG="${{ env.OPERATOR_IMAGE }}:${{ env.TAG }}"
                  make bundle VERSION="0.0.0-${{ env.TAG }}" IMG="$IMG"
                  docker build -f bundle.Dockerfile -t "${{ env.BUNDLE_IMAGE }}:${{ env.TAG }}" .
                  docker push "${{ env.BUNDLE_IMAGE }}:${{ env.TAG }}"

            - name: Validate bundle
              run: |
                  operator-sdk bundle validate ./bundle
                  operator-sdk bundle validate ./bundle --select-optional name=operatorhubv2
                  operator-sdk bundle validate ./bundle --select-optional name=capabilities
                  operator-sdk bundle validate ./bundle --select-optional name=categories

            - name: Update catalog configuration
              run: |
                  make catalog-update VERSION="0.0.0-${{ env.TAG }}" \
                    BUNDLE_IMG="${{ env.BUNDLE_IMAGE }}:${{ env.TAG }}"

            - name: Build and push multi-arch catalog image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: catalog.Dockerfile
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ env.CATALOG_IMAGE }}:${{ env.TAG }}

            - name: Verify images
              run: |
                  echo "=== Verifying pushed images ==="
                  docker buildx imagetools inspect "${{ env.OPERATOR_IMAGE }}:${{ env.TAG }}"
                  docker buildx imagetools inspect "${{ env.TOOLCHAIN_IMAGE }}:${{ env.TAG }}"
                  echo ""
                  echo "=== Test images published ==="
                  echo "Operator:  ${{ env.OPERATOR_IMAGE }}:${{ env.TAG }}"
                  echo "Toolchain: ${{ env.TOOLCHAIN_IMAGE }}:${{ env.TAG }}"
                  echo "Bundle:    ${{ env.BUNDLE_IMAGE }}:${{ env.TAG }}"
                  echo "Catalog:   ${{ env.CATALOG_IMAGE }}:${{ env.TAG }}"
